set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g mouse on
set -g history-limit 100000
setw -g mode-keys vi

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

set -g display-panes-time 4000
set -g repeat-time 2000

# prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# splits/new windows preserve cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# repeatable pane navigation
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# repeatable resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# nav mode
bind g switch-client -T nav
bind -T nav h select-pane -L
bind -T nav j select-pane -D
bind -T nav k select-pane -U
bind -T nav l select-pane -R
bind -T nav H resize-pane -L 5
bind -T nav J resize-pane -D 5
bind -T nav K resize-pane -U 5
bind -T nav L resize-pane -R 5
bind -T nav q switch-client -T root
bind -T nav Escape switch-client -T root

# utility bindings
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"
bind x kill-pane
bind X kill-window

# pane styling
set -g pane-border-lines single
set -g window-style bg=default
set -g window-active-style bg=default
set -g pane-border-style fg=colour235,bg=default
set -g pane-active-border-style fg=colour238,bg=default

# status line
set -g status-style fg=colour250,bg=colour234

# copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe "pbcopy"
bind-key -T copy-mode-vi H send-keys -X start-of-line
bind-key -T copy-mode-vi L send-keys -X end-of-line

# optional: next pane and zoom
bind -r a select-pane -t .+1 \; resize-pane -Z

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session' # Restores Neovim sessions too!
set -g @resurrect-capture-pane-contents 'on'

# More minimal status bar (optional)
set -g status-style fg=colour250,bg=colour234
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'


# optional thinner look
set -g pane-border-lines single


# optional thinner look
set -g pane-border-lines single

set -g window-style bg=default
set -g window-active-style bg=default


# 1. Set the border to match your terminal background or be very dark
# 'default' refers to the terminal's background. 
# If your terminal is transparent, 'default' becomes transparent.
set -g pane-border-style fg=colour235,bg=default
set -g pane-active-border-style fg=colour238,bg=default

# 2. Use "Simple" border lines to keep it thin
set -g pane-border-lines single

# 3. THE KEY: Add a "margin" around panes
# This requires tmux 3.3+. It creates space between the edge and the content.
setw -g pane-border-status off

set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

set -g @catppuccin_flavour 'mocha'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @yank_action 'copy-pipe'

run '~/.tmux/plugins/tpm/tpm'
