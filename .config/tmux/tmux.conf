set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -g mouse on
set -g history-limit 100000
setw -g mode-keys vi

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set -g display-panes-time 4000

# prefix: C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

##### 1) Repeatable prefix (so: C-a then l l l)
# How long (ms) tmux keeps accepting repeated keys after prefix
set -g repeat-time 2000

# Repeatable pane navigation (no more C-a every step)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Repeatable resizing (keep/enable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


##### 2) “Nav mode” (enter once, move freely, exit)
# Enter nav mode: C-a then g  (change g to whatever you like)
bind g switch-client -T nav

# In nav mode: move panes without prefix
bind -T nav h select-pane -L
bind -T nav j select-pane -D
bind -T nav k select-pane -U
bind -T nav l select-pane -R

# In nav mode: resize without prefix (optional, but nice)
bind -T nav H resize-pane -L 5
bind -T nav J resize-pane -D 5
bind -T nav K resize-pane -U 5
bind -T nav L resize-pane -R 5

# Exit nav mode
bind -T nav q switch-client -T root
bind -T nav Escape switch-client -T root

# Clipboard (macOS pbcopy). For Linux, swap to xclip/wl-copy.
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy" 2>/dev/null

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session' # Restores Neovim sessions too!
set -g @resurrect-capture-pane-contents 'on'

# More minimal status bar (optional)
set -g status-style fg=colour250,bg=colour234
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'mocha'


# optional thinner look
set -g pane-border-lines single


# optional thinner look
set -g pane-border-lines single

set -g window-style bg=default
set -g window-active-style bg=default


# 1. Set the border to match your terminal background or be very dark
# 'default' refers to the terminal's background. 
# If your terminal is transparent, 'default' becomes transparent.
set -g pane-border-style fg=colour235,bg=default
set -g pane-active-border-style fg=colour238,bg=default

# 2. Use "Simple" border lines to keep it thin
set -g pane-border-lines single

# 3. THE KEY: Add a "margin" around panes
# This requires tmux 3.3+. It creates space between the edge and the content.
setw -g pane-border-status off

